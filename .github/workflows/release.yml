name: Release

# Build per-OS bundles and publish them to a GitHub Release.
# Cut a release by pushing a tag:  git tag v0.1.0 && git push origin v0.1.0
# Use "Run workflow" (workflow_dispatch) to build without releasing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset: highrise-windows.zip
          - os: macos-latest
            asset: highrise-macos.zip
          - os: ubuntu-latest
            asset: highrise-linux.zip
    steps:
      - name: Checkout (with pygame_core submodule)
        uses: actions/checkout@v7
        with:
          submodules: recursive

      - name: Set up uv + Python
        # setup-uv publishes no floating major tag; pin an exact version.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.12"

      - name: Install dependencies (incl. build group)
        run: uv sync --group build

      - name: Build bundle with PyInstaller
        env:
          # Headless build agents have no display/audio; keep SDL quiet.
          SDL_VIDEODRIVER: dummy
          SDL_AUDIODRIVER: dummy
        run: uv run pyinstaller highrise.spec --noconfirm

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/highrise -DestinationPath ${{ matrix.asset }} -Force

      - name: Package (macOS)
        if: runner.os == 'macOS'
        # ditto preserves the .app bundle's symlinks/permissions (zip can mangle them).
        run: ditto -c -k --sequesterRsrc --keepParent "dist/Highrise.app" "${{ matrix.asset }}"

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: cd dist && zip -r "../${{ matrix.asset }}" highrise

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release and attach bundles
        uses: softprops/action-gh-release@v3
        with:
          files: artifacts/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
